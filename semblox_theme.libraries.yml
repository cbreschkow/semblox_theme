global:
  version: 1.x
  css:
    theme:
      dist/css/global.css: {}
  js:
    dist/js/global.js: {}
  dependencies:
    - core/drupal
    - core/once
    - semblox_tokens/tokens

bootstrap:
  version: 5.3.x
  css:
    theme:
      dist/css/bootstrap.css: { minified: true }
  js:
    dist/js/bootstrap.bundle.js: { minified: true }
  dependencies:
    - core/drupal

brand:
  version: 1.0
  css:
    theme:
      css/semblox-brand.css: { weight: 100 }
  dependencies:
    - semblox_theme/global
  # Marken-Layer: @font-face (Plus Jakarta Sans) + Bootstrap-Variablen
  # (--bs-*) auf die --sx-Tokens mappen. Laedt nach global.css.
