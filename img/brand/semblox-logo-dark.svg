<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 234 60" role="img" aria-label="semblox">
  <title>semblox</title>
  <!-- Slate-Modul hinten (heller für Dark Mode) -->
  <rect x="22" y="4" width="32" height="32" rx="6" fill="#94A3B8"/>
  <!-- Rose-Modul vorne (Rose-500 für Dark Mode) -->
  <rect x="12" y="14" width="32" height="32" rx="6" fill="#F43F5E"/>
  <!-- Wortmarke in hellem Slate -->
  <text x="68" y="42" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="32" font-weight="700" letter-spacing="-1.2">
    <tspan fill="#F8FAFC">sembl</tspan><tspan fill="#F43F5E">o</tspan><tspan fill="#F8FAFC">x</tspan>
  </text>
</svg>
